name: Mobile

# Verifies the Tauri mobile projects build. The Android/iOS projects live under
# src-tauri/gen/ (git-ignored, regenerated by `tauri <platform> init`), so each
# job initialises them from tauri.conf.json before building.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  android:
    name: Android (debug APK)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;27.1.12297006"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install npm dependencies
        run: npm ci

      - name: Initialise Android project
        run: npm run tauri android init
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.1.12297006

      - name: Build debug APK
        run: npm run tauri android build -- --debug --apk
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.1.12297006

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pharmasim-android-debug
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error

  ios:
    name: iOS (core smoke build)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install npm dependencies
        run: npm ci

      - name: Initialise iOS project
        run: npm run tauri ios init

      # A full signed .ipa needs an Apple Developer team + signing secrets. This
      # job verifies the iOS Rust core and Xcode project generate and compile;
      # wire up `tauri ios build` with signing once those secrets are available.
      - name: Build iOS core (device target)
        run: cargo build --manifest-path src-tauri/Cargo.toml --target aarch64-apple-ios
