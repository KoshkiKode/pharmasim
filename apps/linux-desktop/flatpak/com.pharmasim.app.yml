id: com.pharmasim.app
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: PharmaSim
finish-args:
  - --socket=x11
  - --socket=wayland
  - --share=ipc
  - --device=dri
  - --filesystem=host
  - --share=network
modules:
  - name: pharmasim
    buildsystem: simple
    build-commands:
      - install -Dm755 PharmaSim /app/bin/PharmaSim
      - install -Dm644 icon.png /app/share/icons/hicolor/512x512/apps/com.pharmasim.app.png
      - install -Dm644 com.pharmasim.app.desktop /app/share/applications/com.pharmasim.app.desktop
    sources:
      - type: file
        path: ../src-tauri/target/release/PharmaSim
      - type: file
        path: ../src-tauri/icons/icon.png
      - type: file
        path: com.pharmasim.app.desktop
